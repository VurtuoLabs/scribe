<template>
    <lightning-card title="Scribe Change Log" icon-name="custom:custom18">
        <span slot="actions" class="slds-text-body_small slds-text-color_weak">{rowCountLabel}</span>

        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <div class="slds-grid slds-gutters slds-wrap slds-grid_vertical-align-end">
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                    <lightning-combobox label="Rep" value={repFilter} options={repOptions}
                        onchange={handleRep}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                    <lightning-combobox label="Object" value={objectFilter} options={objectOptions}
                        onchange={handleObject}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                    <lightning-combobox label="Change Type" value={typeFilter} options={typeOptions}
                        onchange={handleType}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                    <lightning-input type="date" label="From" value={startDate}
                        onchange={handleStart}></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                    <lightning-input type="date" label="To" value={endDate}
                        onchange={handleEnd}></lightning-input>
                </div>
            </div>
            <div class="slds-p-top_x-small">
                <lightning-button label="Reset filters" onclick={handleReset}
                    variant="neutral"></lightning-button>
            </div>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>

        <template if:true={error}>
            <div class="slds-p-horizontal_medium slds-text-color_error" role="alert">{error}</div>
        </template>

        <template if:true={hasRows}>
            <div class="slds-p-horizontal_x-small" style="min-height: 8rem;">
                <lightning-datatable
                    key-field="id"
                    data={rows}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}
                    column-widths-mode="auto">
                </lightning-datatable>
            </div>
        </template>

        <template if:false={hasRows}>
            <template if:false={isLoading}>
                <div class="slds-p-around_large slds-align_absolute-center slds-text-color_weak">
                    No changes match these filters yet.
                </div>
            </template>
        </template>
    </lightning-card>
</template>
