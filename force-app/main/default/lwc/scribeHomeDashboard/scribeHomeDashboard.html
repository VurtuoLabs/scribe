<template>
    <div class="slds-grid slds-gutters slds-wrap slds-p-bottom_small">
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
            <lightning-card>
                <div class="slds-p-around_medium slds-text-align_center">
                    <div class="slds-text-heading_large">{totalThisWeek}</div>
                    <div class="slds-text-body_small slds-text-color_weak">changes this week</div>
                </div>
            </lightning-card>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
            <lightning-card>
                <div class="slds-p-around_medium slds-text-align_center">
                    <div class="slds-text-heading_large">{totalAllTime}</div>
                    <div class="slds-text-body_small slds-text-color_weak">changes all time</div>
                </div>
            </lightning-card>
        </div>
    </div>

    <template if:true={error}>
        <div class="slds-text-color_error slds-p-around_small" role="alert">{error}</div>
    </template>

    <div class="slds-grid slds-gutters slds-wrap">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
            <lightning-card title="Most active reps this week" icon-name="standard:user">
                <template if:true={hasReps}>
                    <ul class="slds-has-dividers_bottom-space slds-p-horizontal_medium">
                        <template for:each={topReps} for:item="r">
                            <li key={r.label} class="slds-item slds-grid slds-grid_align-spread">
                                <span>{r.label}</span>
                                <span class="slds-badge">{r.count}</span>
                            </li>
                        </template>
                    </ul>
                </template>
                <template if:false={hasReps}>
                    <p class="slds-p-around_medium slds-text-color_weak">No activity this week yet.</p>
                </template>
            </lightning-card>
        </div>

        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
            <lightning-card title="Most-touched objects this week" icon-name="standard:record">
                <template if:true={hasObjects}>
                    <ul class="slds-has-dividers_bottom-space slds-p-horizontal_medium">
                        <template for:each={topObjects} for:item="o">
                            <li key={o.label} class="slds-item slds-grid slds-grid_align-spread">
                                <span>{o.label}</span>
                                <span class="slds-badge">{o.count}</span>
                            </li>
                        </template>
                    </ul>
                </template>
                <template if:false={hasObjects}>
                    <p class="slds-p-around_medium slds-text-color_weak">No activity this week yet.</p>
                </template>
            </lightning-card>
        </div>
    </div>

    <lightning-card title="Changes — last 7 days" icon-name="standard:metrics">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template for:each={trend} for:item="t">
                <div key={t.key} class="slds-grid slds-grid_vertical-align-center slds-p-vertical_xxx-small">
                    <div class="slds-size_1-of-4 slds-text-body_small slds-text-color_weak">{t.label}</div>
                    <div class="slds-size_3-of-4 slds-grid slds-grid_vertical-align-center">
                        <div class="scribe-bar" style={t.style}></div>
                        <span class="slds-p-left_x-small slds-text-body_small">{t.count}</span>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
